name: Create Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Which version bump (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  create-bump-pr:
    name: Create bump PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate base branch and bump type
        id: validate
        shell: bash
        run: |
          BASE="${{ github.ref_name }}"
          BUMP="${{ inputs.bump }}"
          echo "Validating base branch: $BASE"
          echo "Requested bump type: $BUMP"

          # Restrict workflow execution to main or release/*
          if [[ ! "$BASE" =~ ^main$ ]] && [[ ! "$BASE" =~ ^release\/.+$ ]]; then
            echo "ERROR: workflow may only be dispatched from 'main' or a 'release/*' branch. Selected: $BASE"
            exit 1
          fi

          # Restrict bump types on release branches
          if [[ "$BASE" =~ ^release\/.+$ ]] && [[ "$BUMP" != "patch" ]]; then
            echo "ERROR: Only 'patch' bumps are allowed on release branches (attempted '$BUMP')."
            exit 1
          fi

          echo "Validation passed for $BASE with bump '$BUMP'"
          echo "ok=true" >> $GITHUB_OUTPUT

      - name: Run bump version and create automation branch
        id: bump
        uses: ./.github/action/bump-npm-version
        with:
          bump: ${{ inputs.bump }}
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}

      - name: Generate release notes preview
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.bump.outputs.tag }}"
          prev=$(gh release list --repo "${{ github.repository }}" --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")

          api_args=(
            --method POST
            -H "Accept: application/vnd.github+json"
            "/repos/${{ github.repository }}/releases/generate-notes"
            -f "tag_name=${tag}"
            -f "target_commitish=${{ github.sha }}"
            --jq '.body'
          )
          if [[ -n "$prev" ]]; then
            api_args+=(-f "previous_tag_name=${prev}")
          fi

          notes=$(gh api "${api_args[@]}" 2>/dev/null || echo "_Could not generate release notes preview._")

          {
            echo "## Release Notes Preview (${prev:-'first release'} → ${tag})"
            echo ""
            echo "$notes"
          } > /tmp/pr-body.md

      - name: Open PR from automation branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --repo "${{ github.repository }}" \
            --head "${{ steps.bump.outputs.auto_branch }}" \
            --base "${{ github.ref_name }}" \
            --title "[Release] Bump version - automated" \
            --body-file /tmp/pr-body.md
